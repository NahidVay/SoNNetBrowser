name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract Project
        run: unzip -q LeadBrowser-ready.zip -d project

      - name: Make Gradle Executable
        run: chmod +x project/LeadBrowser/gradlew

      - name: Build Debug APK
        working-directory: project/LeadBrowser
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LeadBrowser-Debug
          path: project/LeadBrowser/app/build/outputs/apk/debug/*.apk
